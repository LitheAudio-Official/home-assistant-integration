play_chime:
  name: Play chime
  description: >
    Trigger a built-in audio cue (doorbell, alarm, notification tone, etc.)
    on one or more Lithe Audio speakers. Cues are stored on the speaker
    itself, so they play instantly with no streaming delay.
  target:
    entity:
      integration: lithe_audio
      domain: media_player
  fields:
    chime_index:
      name: Chime number
      description: Number of the built-in cue (1-15, depending on speaker model).
      required: true
      example: 1
      selector:
        number:
          min: 1
          max: 15
          mode: box

play_preset:
  name: Play preset
  description: >
    Play a saved favourite by slot number. Useful for one-tap recall of
    radio stations or playlists.
  target:
    entity:
      integration: lithe_audio
      domain: media_player
  fields:
    preset_slot:
      name: Preset slot
      description: Favourite slot number (1-9).
      required: true
      example: 1
      selector:
        number:
          min: 1
          max: 9
          mode: box

save_preset:
  name: Save preset
  description: >
    Save whatever is currently playing into a favourite slot so it can be
    recalled later with Play Preset.
  target:
    entity:
      integration: lithe_audio
      domain: media_player
  fields:
    preset_slot:
      name: Preset slot
      description: Favourite slot number (1-9).
      required: true
      example: 1
      selector:
        number:
          min: 1
          max: 9
          mode: box

delete_preset:
  name: Delete preset
  description: Clear a saved favourite slot.
  target:
    entity:
      integration: lithe_audio
      domain: media_player
  fields:
    preset_slot:
      name: Preset slot
      description: Favourite slot number to delete (1-9).
      required: true
      example: 1
      selector:
        number:
          min: 1
          max: 9
          mode: box

play_direct:
  name: Play URL or file
  description: >
    Play an audio URL, or a built-in file on the speaker.
  target:
    entity:
      integration: lithe_audio
      domain: media_player
  fields:
    path:
      name: URL or file path
      description: An http(s) URL, or a built-in file path on the speaker.
      required: true
      example: "http://example.com/announcement.mp3"
      selector:
        text:

send_raw_command:
  name: Send advanced command
  description: >
    Advanced - send a low-level control command directly to the speaker.
    Most users will not need this; use the other services for normal control.
  target:
    entity:
      integration: lithe_audio
      domain: media_player
  fields:
    mbid:
      name: Command ID
      description: Numeric command identifier.
      required: true
      example: 40
      selector:
        number:
          min: 0
          max: 65535
          mode: box
    payload:
      name: Payload
      description: Command payload (text).
      required: true
      example: "PLAY"
      selector:
        text:
    cmd_type:
      name: Command type
      description: Get (read) or Set (write). Defaults to Set.
      required: false
      default: "set"
      example: "set"
      selector:
        select:
          options:
            - label: "Get (read)"
              value: "get"
            - label: "Set (write)"
              value: "set"

reboot:
  name: Reboot speaker
  description: >
    Reboot the speaker. The connection will drop briefly while it restarts.
  target:
    entity:
      integration: lithe_audio
      domain: media_player
