rules:
  # ── Bronze (mandatory for all new integrations) ────────────────────────
  action-setup:
    status: exempt
    comment: |
      Services are registered in async_setup, not on a per-entry basis,
      and don't need entry-time validation beyond what voluptuous handles.
  appropriate-polling:
    status: exempt
    comment: |
      This is a local_push integration — the speaker pushes state updates
      over a persistent TCP connection. No polling is performed.
  brands: todo
  common-modules: done
  config-flow: done
  config-flow-test-coverage: todo
  dependency-transparency: done
  docs-actions: done
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: todo
  entity-event-setup:
    status: exempt
    comment: |
      Entities subscribe to coordinator updates via the standard
      CoordinatorEntity machinery; no custom event setup needed.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # ── Silver ─────────────────────────────────────────────────────────────
  action-exceptions: todo
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: todo
  log-when-unavailable: done
  parallel-updates: todo
  reauthentication-flow:
    status: exempt
    comment: |
      Encrypted-connection models use a static client certificate issued by
      Lithe Audio. There is no token rotation; the user replaces the cert
      via the reconfigure flow if it ever changes.
  test-coverage: todo

  # ── Gold ───────────────────────────────────────────────────────────────
  devices: done
  diagnostics: done
  discovery: done
  discovery-update-info: done
  docs-data-update: done
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices: done
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices:
    status: exempt
    comment: |
      One config entry corresponds to one physical speaker. New speakers
      are added through the standard discovery / manual flows.
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default: done
  entity-translations: todo
  exception-translations: todo
  icon-translations: todo
  reconfiguration-flow: todo
  repair-issues:
    status: exempt
    comment: No transient error states warrant repair issues yet.
  stale-devices:
    status: exempt
    comment: |
      Speakers are user-configured and don't disappear silently; removal
      is explicit via the integration UI.

  # ── Platinum ───────────────────────────────────────────────────────────
  async-dependency: done
  inject-websession:
    status: exempt
    comment: Integration uses raw TCP/TLS sockets, not HTTP.
  strict-typing: todo
